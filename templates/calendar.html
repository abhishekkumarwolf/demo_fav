{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar - FavHost</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}?v=1.1">
</head>
<body>
  {% include 'navbar.html' with active='calendar' %}

  <div class="page-content page-content--calendar">
    <div class="page-header" style="background: #ffffff; border-bottom: 1px solid var(--color-border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; position: relative; margin-bottom: 0px;">
      <div style="display: flex; align-items: center; gap: 12px;">
        <div class="calendar-timeline-pill" style="display: flex; align-items: center; gap: 8px; background: #334155; color: #ffffff; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; font-family: var(--font-family); user-select: none;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="color: #ffffff;"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
          <span>Calendar - Timeline view</span>
        </div>
      </div>

      <!-- Center navigation pill -->
      <div class="month-nav-pill">
        <button class="nav-arrow-btn" id="prevPeriod" title="Previous">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <span class="month-label" id="periodTitle">Loading...</span>
        <button class="nav-arrow-btn" id="nextPeriod" title="Next">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
        <div class="nav-divider"></div>
        <button class="nav-cal-icon-btn" title="Choose date">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
        </button>
      </div>

      <!-- Right actions -->
      <div class="toolbar-actions-right" style="display: flex; align-items: center; gap: 12px;">
        <!-- Status Filter Select -->
        <select class="cal-filter-select" id="statusFilter" style="padding: 6px 12px; border: 1px solid var(--color-border); border-radius: 8px; font-size: 13px; font-family: var(--font-family); outline: none; background: #ffffff; color: var(--color-text-secondary); cursor: pointer;">
          <option value="">All Statuses</option>
          <option value="confirmed">Confirmed</option>
          <option value="pending">Pending</option>
          <option value="cancelled">Cancelled</option>
          <option value="checked_out">Checked Out</option>
        </select>
        
        <!-- View Toggle buttons (Month/Week) -->
        <div class="view-toggle" style="background: var(--color-bg); border-radius: 8px; padding: 2px; display: flex; gap: 2px;">
          <button class="view-btn active" id="monthViewBtn" data-view="month" style="border: none; background: none; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; color: var(--color-text-secondary); font-family: var(--font-family);">Month</button>
          <button class="view-btn" id="weekViewBtn" data-view="week" style="border: none; background: none; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; color: var(--color-text-secondary); font-family: var(--font-family);">Week</button>
        </div>

        <button class="icon-action-btn" title="Search"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg></button>
        <button class="icon-action-btn" onclick="location.reload()" title="Refresh"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg></button>
        <div class="view-toggle-icons" style="display: flex; align-items: center; border: 1px solid var(--color-border); border-radius: 8px; overflow: hidden; background: #ffffff;">
          <button class="icon-action-btn active" id="gridToggleBtn" title="Grid View" style="border: none; border-radius: 0; padding: 8px; border-right: 1px solid var(--color-border);"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg></button>
          <button class="icon-action-btn" id="listToggleBtn" title="Timeline View" style="border: none; border-radius: 0; padding: 8px;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></button>
        </div>
      </div>
    </div>

    <div class="main-layout main-layout--embedded">
      <aside class="sidebar sidebar--embedded">
        <div class="sidebar-header">
          <h3 class="sidebar-title">Properties</h3>
          <span class="property-count" id="propertyCount">0</span>
        </div>
        <div class="sidebar-search">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input type="text" id="propertySearch" placeholder="Search listings...">
        </div>
        <div class="property-list" id="propertyList"></div>
      </aside>

      <section class="calendar-section calendar-section--embedded">
        <!-- Month view -->
        <div class="calendar-container" id="calendarContainer">
          <div class="calendar-weekdays" id="calendarWeekdays">
            <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
          </div>
          <div class="calendar-grid" id="calendarGrid"></div>
        </div>

        <!-- Week view -->
        <div class="week-container" id="weekContainer" style="display:none">
          <div class="week-grid" id="weekGrid"></div>
        </div>

        <div class="empty-state" id="emptyState">
          <div class="empty-state-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="16" y1="2" x2="16" y2="6"></line>
              <line x1="8" y1="2" x2="8" y2="6"></line>
              <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
          </div>
          <h3>No bookings</h3>
          <p>This property has no bookings for the selected period.</p>
        </div>
      </section>
    </div>
  </div>

  <!-- Booking Detail Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="bookingModal">
      <button class="modal-close" id="modalClose">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
      <div class="modal-content" id="modalContent"></div>
    </div>
  </div>

  <script src="{% static 'js/calendar.js' %}"></script>
  <script src="{% static 'js/app.js' %}"></script>
</body>
</html>
