{% load static %}
<header class="navbar">
  <div class="navbar-inner">
    <div class="navbar-left">
      <a href="{% url 'landing' %}" class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 9L12 2L21 9V20C21 20.5304 20.7893 21.0391 20.4142 21.4142C20.0391 21.7893 19.5304 22 19 22H5C4.46957 22 3.96086 21.7893 3.58579 21.4142C3.21071 21.0391 3 20.5304 3 20V9Z" stroke="#55c1d9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M9 22V12H15V22" stroke="#55c1d9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>FavHost</span>
      </a>
    </div>
    <nav class="navbar-nav">
      <a href="{% url 'index' %}" class="nav-item{% if active == 'dashboard' %} active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span>Dashboard</span>
      </a>
      <a href="{% url 'calendar' %}" class="nav-item{% if active == 'calendar' %} active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>Calendar</span>
      </a>
      <a href="{% url 'reservations' %}" class="nav-item{% if active == 'reservations' %} active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        <span>Reservations</span>
      </a>
      <a href="{% url 'listings' %}" class="nav-item{% if active == 'listings' %} active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Listings</span>
      </a>
      <a href="{% url 'tasks' %}" class="nav-item{% if active == 'tasks' %} active{% endif %}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        <span>Tasks</span>
      </a>
      <a href="{% url 'enquiries' %}" class="nav-item{% if active == 'enquiries' %} active{% endif %}" id="navbarEnquiriesLink">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span>Enquiries</span><span class="nav-item-badge" id="enquiriesBadgeCount" style="display: none;">0</span>
      </a>
    </nav>
    <div class="navbar-right">
      <button class="notif-btn" title="Notifications">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <span class="notif-dot"></span>
      </button>
      <button class="avatar-btn">
        <div class="avatar">
          <img src="https://ui-avatars.com/api/?name=Host+User&background=55c1d9&color=fff&size=30" alt="Profile">
        </div>
        <span>Host User</span>
      </button>
    </div>
  </div>
</header>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    fetch('/api/inquiries/?status=new')
      .then(r => r.json())
      .then(data => {
        const badge = document.getElementById('enquiriesBadgeCount');
        if (data && data.length > 0) {
          badge.textContent = data.length;
          badge.style.display = 'inline-flex';
        } else {
          badge.style.display = 'none';
        }
      })
      .catch(() => {});
  });
</script>
