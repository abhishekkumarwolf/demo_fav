{% extends 'base.html' %}
{% load static %}

{% block title %}Enquiries - FavHost{% endblock %}

{% block content %}
  {% include 'navbar.html' with active='enquiries' %}

  <div class="page-content">
    <div class="page-header">
      <div>
        <h1 class="page-title">Enquiries</h1>
        <p class="page-subtitle">Guest inquiries, messages, and booking requests</p>
      </div>
    </div>

    <div class="filter-bar">
      <button class="filter-btn inquiry-filter-btn active" data-status="">All</button>
      <button class="filter-btn inquiry-filter-btn" data-status="new">New</button>
      <button class="filter-btn inquiry-filter-btn" data-status="replied">Replied</button>
      <button class="filter-btn inquiry-filter-btn" data-status="archived">Archived</button>
    </div>

    <div class="card">
      <div class="card-body message-list" id="inquiryList">
        <div class="text-muted" style="padding:24px">Loading...</div>
      </div>
    </div>
  </div>
{% endblock %}

{% block extra_js %}
  <script src="{% static 'js/inquiries.js' %}"></script>
{% endblock %}
