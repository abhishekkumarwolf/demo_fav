{% extends 'base.html' %}
{% load static %}

{% block title %}Tasks - FavHost{% endblock %}

{% block content %}
  {% include 'navbar.html' with active='tasks' %}

  <div class="page-content">
    <div class="page-header">
      <div>
        <h1 class="page-title">Tasks</h1>
        <p class="page-subtitle">Cleaning schedules, maintenance requests, and operations</p>
      </div>
    </div>

    <div class="filter-bar">
      <button class="filter-btn task-filter-btn active" data-type="" data-status="">All Tasks</button>
      <button class="filter-btn task-filter-btn" data-type="cleaning" data-status="">Cleaning</button>
      <button class="filter-btn task-filter-btn" data-type="maintenance" data-status="">Maintenance</button>
      <button class="filter-btn task-filter-btn" data-type="inspection" data-status="">Inspection</button>
      <button class="filter-btn task-filter-btn" data-type="" data-status="pending">Pending</button>
      <button class="filter-btn task-filter-btn" data-type="" data-status="done">Done</button>
    </div>

    <div class="card">
      <div class="activity-list" id="taskList">
        <div class="text-muted" style="padding:24px">Loading...</div>
      </div>
    </div>
  </div>
{% endblock %}

{% block extra_js %}
  <script src="{% static 'js/tasks.js' %}"></script>
{% endblock %}
