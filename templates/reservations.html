{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reservations - FavHost</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}?v=1.1">
</head>
<body>
  {% include 'navbar.html' with active='reservations' %}

  <div class="page-content">
    <div class="page-header">
      <div>
        <h1 class="page-title">Reservations</h1>
        <p class="page-subtitle">Manage all upcoming, active, and completed bookings</p>
      </div>
      <button class="filter-btn primary" id="newReservationBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Reservation
      </button>
    </div>

    <div class="filter-bar">
      <input type="text" class="search-input" placeholder="Search by guest name or property..." id="reservationSearch">
      <button class="filter-btn" id="filterBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>
        Filter
      </button>
      <button class="filter-btn" id="sortBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 22 15 16 15 16 21 10 15 2 15 2 3"/></svg>
        Sort
      </button>
    </div>

    <div class="card">
      <table class="table">
        <thead>
          <tr>
            <th>Guest</th>
            <th>Property</th>
            <th>Check In</th>
            <th>Check Out</th>
            <th>Nights</th>
            <th>Status</th>
            <th>Amount</th>
            <th>Source</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="reservationsTable">
          <tr><td colspan="9" class="text-muted">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Create Reservation Modal -->
  <div class="modal-overlay" id="createBookingModal">
    <div class="modal">
      <button class="modal-close" id="closeModalBtn" type="button">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="modal-content">
        <div class="modal-header">
          <div class="modal-guest-info">
            <h2>New Reservation</h2>
            <p class="modal-property-name">Create a new booking</p>
          </div>
        </div>

        <div class="alert-error" id="formAlert"></div>
        <div class="alert-success" id="formSuccess"></div>

        <form id="createBookingForm">
          <div class="modal-body" style="grid-template-columns:1fr 1fr;">

            <div class="form-group">
              <label class="form-label" for="bookingProperty">Property</label>
              <select class="form-control" id="bookingProperty" required>
                <option value="">Select property...</option>
              </select>
            </div>

            <div class="form-group">
              <label class="form-label" for="bookingGuest">Guest</label>
              <select class="form-control" id="bookingGuest" required>
                <option value="">Select guest...</option>
              </select>
            </div>

            <div class="form-group">
              <label class="form-label" for="bookingCheckIn">Check In</label>
              <input type="date" class="form-control" id="bookingCheckIn" required>
            </div>

            <div class="form-group">
              <label class="form-label" for="bookingCheckOut">Check Out</label>
              <input type="date" class="form-control" id="bookingCheckOut" required>
            </div>

            <div class="form-group">
              <label class="form-label" for="bookingPrice">Price Per Night ($)</label>
              <input type="number" class="form-control" id="bookingPrice" placeholder="0" min="0" step="0.01">
            </div>

            <div class="form-group">
              <label class="form-label" for="bookingTotal">Total Price ($)</label>
              <input type="number" class="form-control" id="bookingTotal" placeholder="0" min="0" step="0.01" required>
            </div>

            <div class="form-group">
              <label class="form-label" for="bookingSource">Booking Source</label>
              <input type="text" class="form-control" id="bookingSource" placeholder="e.g. Booking.com">
            </div>

            <div class="form-group">
              <label class="form-label" for="bookingStatus">Status</label>
              <select class="form-control" id="bookingStatus">
                <option value="confirmed">Confirmed</option>
                <option value="pending">Pending</option>
              </select>
            </div>

          </div>

          <div class="modal-footer">
            <button type="button" class="modal-btn modal-btn-secondary" id="cancelBtn">Cancel</button>
            <button type="submit" class="modal-btn modal-btn-primary" id="submitBooking">Create Reservation</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="{% static 'js/reservations.js' %}"></script>
</body>
</html>
